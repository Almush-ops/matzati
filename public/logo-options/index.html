<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>אפשרויות לוגו - מצאתי</title>
  <style>
    body {
      font-family: Rubik, Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 40px; }
    .options {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .option {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .option h3 { margin: 20px 0 10px; color: #5046E5; }
    .option p { color: #666; font-size: 14px; margin: 0; }
    img { width: 128px; height: 128px; }
    .sizes {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
      align-items: flex-end;
    }
    .sizes img { border: 1px solid #ddd; }
    .s64 { width: 64px; height: 64px; }
    .s32 { width: 32px; height: 32px; }
    .s16 { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <h1>אפשרויות לוגו - מצאתי</h1>
  <div class="options">
    <div class="option">
      <img src="option1.svg" alt="Option 1">
      <h3>אפשרות 1</h3>
      <p>אות מ׳ נקייה</p>
      <div class="sizes">
        <img src="option1.svg" class="s64">
        <img src="option1.svg" class="s32">
        <img src="option1.svg" class="s16">
      </div>
    </div>
    <div class="option">
      <img src="option2.svg" alt="Option 2">
      <h3>אפשרות 2</h3>
      <p>מ׳ עם קו אקסנט צהוב</p>
      <div class="sizes">
        <img src="option2.svg" class="s64">
        <img src="option2.svg" class="s32">
        <img src="option2.svg" class="s16">
      </div>
    </div>
    <div class="option">
      <img src="option3.svg" alt="Option 3">
      <h3>אפשרות 3</h3>
      <p>זכוכית מגדלת (מצאתי = מצאתי)</p>
      <div class="sizes">
        <img src="option3.svg" class="s64">
        <img src="option3.svg" class="s32">
        <img src="option3.svg" class="s16">
      </div>
    </div>
    <div class="option">
      <img src="option4.svg" alt="Option 4">
      <h3>אפשרות 4</h3>
      <p>מ׳ בתוך זכוכית מגדלת</p>
      <div class="sizes">
        <img src="option4.svg" class="s64">
        <img src="option4.svg" class="s32">
        <img src="option4.svg" class="s16">
      </div>
    </div>
  </div>
</body>
</html>
