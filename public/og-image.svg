<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Crossword grid pattern -->
  <g fill="rgba(255,255,255,0.1)" transform="translate(50, 150)">
    <rect x="0" y="0" width="60" height="60"/>
    <rect x="70" y="0" width="60" height="60"/>
    <rect x="140" y="0" width="60" height="60"/>
    <rect x="0" y="70" width="60" height="60"/>
    <rect x="140" y="70" width="60" height="60"/>
    <rect x="0" y="140" width="60" height="60"/>
    <rect x="70" y="140" width="60" height="60"/>
    <rect x="140" y="140" width="60" height="60"/>
  </g>

  <g fill="rgba(255,255,255,0.1)" transform="translate(950, 350)">
    <rect x="0" y="0" width="50" height="50"/>
    <rect x="55" y="0" width="50" height="50"/>
    <rect x="110" y="0" width="50" height="50"/>
    <rect x="0" y="55" width="50" height="50"/>
    <rect x="55" y="55" width="50" height="50"/>
    <rect x="110" y="55" width="50" height="50"/>
  </g>

  <!-- Main text -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white">מצאתי</text>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)">פתרונות תשבצים בעברית</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">הגדרות | מילים נרדפות | חרוזים</text>
</svg>
